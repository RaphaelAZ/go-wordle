version: 2

project_name: go-wordle

builds:
  - id: tui
    dir: ./tui
    main: .
    binary: go-wordle
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: tui
    builds:
      - tui
    format: tar.gz
  - id: tui-zip
    builds:
      - tui
    format: zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc

scoops:
  - repository:
      owner: RaphaelAZ
      name: scoop-bucket-gowordle
    ids:
      - tui
    directory: bucket
    commit_author:
      name: RaphaelAz
      email: azevedo.raphael2017@gmail.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Version }}"
    description: "Gowordle - CLI Wordle game"
    homepage: "https://github.com/RaphaelAZ/go-wordle"
    license: MIT