version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wordle
      POSTGRES_PASSWORD: wordle_secret
      POSTGRES_DB: wordle_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wordle -d wordle_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
